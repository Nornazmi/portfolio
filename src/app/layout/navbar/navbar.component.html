<nav class="sticky top-0 z-50 border-b border-zinc-200 dark:border-zinc-800
            bg-white/80 dark:bg-zinc-950/80 backdrop-blur-md">
  <div class="max-w-6xl mx-auto px-6 h-16 flex items-center gap-8">

    <!-- Brand -->
    <a routerLink="/"
       class="font-display text-lg font-bold tracking-tight text-zinc-900 dark:text-white mr-auto
              hover:text-accent transition-colors">
      Nornazmi
    </a>

    <!-- Desktop Nav links -->
    <ul class="hidden sm:flex items-center gap-1 list-none m-0 p-0">
      <li *ngFor="let link of navLinks">
        <a [routerLink]="link.path"
           routerLinkActive="text-accent font-medium"
           [routerLinkActiveOptions]="{ exact: link.path === '/' }"
           class="px-3 py-2 rounded-lg text-sm text-zinc-500 dark:text-zinc-400
                  hover:bg-zinc-100 dark:hover:bg-zinc-800 hover:text-zinc-900
                  dark:hover:text-zinc-100 transition-all duration-150">
          {{ link.label }}
        </a>
      </li>
    </ul>

    <!-- Theme toggle -->
    <app-theme-toggle />

    <!-- Mobile menu button -->
    <button class="sm:hidden p-2 rounded-lg text-zinc-500 dark:text-zinc-400
                   hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors"
            (click)="toggleMobileMenu()"
            [attr.aria-expanded]="isMobileMenuOpen"
            [attr.aria-label]="isMobileMenuOpen ? 'Close menu' : 'Open menu'">
      <!-- Hamburger icon -->
      <svg *ngIf="!isMobileMenuOpen" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="4" y1="12" x2="20" y2="12"></line>
        <line x1="4" y1="6" x2="20" y2="6"></line>
        <line x1="4" y1="18" x2="20" y2="18"></line>
      </svg>
      <!-- Close icon -->
      <svg *ngIf="isMobileMenuOpen" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
  </div>

  <!-- Mobile menu -->
  <div *ngIf="isMobileMenuOpen" 
       class="sm:hidden border-t border-zinc-200 dark:border-zinc-800 bg-white/95 dark:bg-zinc-950/95 backdrop-blur-md">
    <div class="max-w-6xl mx-auto px-6 py-4">
      <ul class="flex flex-col gap-1 list-none m-0 p-0">
        <li *ngFor="let link of navLinks">
          <a [routerLink]="link.path"
             (click)="closeMobileMenu()"
             routerLinkActive="text-accent font-medium"
             [routerLinkActiveOptions]="{ exact: link.path === '/' }"
             class="block px-3 py-2 rounded-lg text-sm text-zinc-500 dark:text-zinc-400
                    hover:bg-zinc-100 dark:hover:bg-zinc-800 hover:text-zinc-900
                    dark:hover:text-zinc-100 transition-all duration-150">
            {{ link.label }}
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>
